        :root {

        /* إعدادات عامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        /* صورة الملف الشخصي */
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            object-fit: cover;
            margin-bottom: 20px;
        }

        /* العنوان */
        h1 {
            color: var(--text-color);
            font-size: 28px;
            margin-bottom: 10px;
        }

        /* الوصف */
        .bio {
            color: #888;
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Container الروابط */
        .links-container {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* أزرار الروابط */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .link-btn i {
            margin-left: 10px;
            font-size: 24px;
        }

        /* TikTok */
        .tiktok {
            background: var(--tiktok-color);
        }

        /* إنستغرام */
        .instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        /* فيس بوك */
        .facebook {
            background: var(--facebook-color);
        }

        /* يوتيوب */
